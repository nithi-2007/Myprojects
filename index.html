<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GoodLife Hospital</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      text-align: center;
      padding: 20px;
    }
    /* simple heart logo */
    .heart {
      width: 50px;
      height: 50px;
      background: red;
      position: relative;
      display: inline-block;
      transform: rotate(-45deg);
      margin-bottom: 10px;
    }
    .heart::before,
    .heart::after {
      content: "";
      width: 50px;
      height: 50px;
      background: red;
      border-radius: 50%;
      position: absolute;
    }
    .heart::before { top: -25px; left: 0; }
    .heart::after { left: 25px; top: 0; }

    h1 {
      margin: 10px 0;
      color: #333;
    }
    form {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      display: inline-block;
      text-align: left;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    label { display: block; margin: 10px 0 5px; }
    input, select {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background: red;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 4px;
      cursor: pointer;
    }
    #confirmation {
      margin-top: 20px;
      padding: 10px;
      background: #e6ffe6;
      border: 1px solid #99cc99;
      display: none;
    }
  </style>
</head>
<body>

  <div class="heart"></div>
  <h1>GoodLife Hospital</h1>

  <form id="appointmentForm">
    <label for="name">Patient Name:</label>
    <input type="text" id="name" required>

    <label for="age">Age:</label>
    <input type="number" id="age" required>

    <label for="phone">Phone:</label>
    <input type="text" id="phone" required>

    <label for="slot">Preferred Time:</label>
    <select id="slot" required>
      <option value="">--Select--</option>
      <option value="Forenoon">Forenoon</option>
      <option value="Afternoon">Afternoon</option>
    </select>

    <button type="submit">Book Appointment</button>
  </form>

  <div id="confirmation"></div>

  <script>
    document.getElementById("appointmentForm").addEventListener("submit", function(e) {
      e.preventDefault(); // stop page reload

      const name = document.getElementById("name").value;
      const age = document.getElementById("age").value;
      const phone = document.getElementById("phone").value;
      const slot = document.getElementById("slot").value;

      const msg = Thank you, ${name}! Your appointment is booked in the ${slot}.;
      const confirmationBox = document.getElementById("confirmation");
      confirmationBox.innerText = msg;
      confirmationBox.style.display = "block";
    });
  </script>

</body>
</html>
